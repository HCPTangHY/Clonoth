version: 1
kind: workflow
id: bootstrap.plan_execute_review
name: "计划-执行-复核"
description: >-
  入口节点判断后，以 handoff 方式进入 planner → executor → reviewer 子链。
  子链结束后，再回到入口节点继续生成对用户的最终回复。

entry_node: bootstrap.shell_orchestrator

nodes:
  bootstrap.shell_orchestrator:
    on:
      reply: $reply
    handoffs:
      handoff: bootstrap.planner

  bootstrap.planner:
    on:
      completed: bootstrap.executor
      failed: $end

  bootstrap.executor:
    on:
      completed: bootstrap.reviewer
      failed: $end
    handoffs:
      cmd_review: bootstrap.cmd_reviewer

  bootstrap.cmd_reviewer:
    on:
      completed: $end
      failed: $end

  bootstrap.reviewer:
    on:
      completed: $end
      failed: $end
