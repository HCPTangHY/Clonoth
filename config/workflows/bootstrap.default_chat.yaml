version: 1
kind: workflow
id: bootstrap.default_chat
name: "默认对话流"
description: >-
  入口节点先判断是否直接回复。若需要下游处理，则以 handoff 方式交给执行节点。
  执行节点与命令审核节点也通过 handoff 协作。所有节点之间均由 task 调度衔接，
  不再直接阻塞等待。

entry_node: bootstrap.shell_orchestrator

nodes:
  bootstrap.shell_orchestrator:
    on:
      reply: $reply
    handoffs:
      handoff: bootstrap.executor
      cmd_review: bootstrap.cmd_reviewer

  bootstrap.executor:
    on:
      completed: $end
      failed: $end
    handoffs:
      cmd_review: bootstrap.cmd_reviewer

  bootstrap.cmd_reviewer:
    on:
      completed: $end
      failed: $end
