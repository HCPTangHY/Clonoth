version: 1
kind: workflow
id: bootstrap.default_chat
name: "默认对话流"
description: >-
  入口节点判断是否直接回复；若需下游处理，交给执行节点；执行完成后回到入口节点输出最终回复。
  执行节点需要运行命令时，通过 handoff 交给审核节点。

entry_node: bootstrap.shell_orchestrator

nodes:
  bootstrap.shell_orchestrator:
    on:
      reply: $reply
      handoff: bootstrap.executor
    handoffs:
      cmd_review: bootstrap.cmd_reviewer

  bootstrap.executor:
    on:
      completed: bootstrap.shell_orchestrator
      failed: bootstrap.shell_orchestrator
    handoffs:
      cmd_review: bootstrap.cmd_reviewer

  bootstrap.cmd_reviewer:
    on:
      completed: $end
      failed: $end
