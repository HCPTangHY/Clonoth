version: 1
kind: agent_profile
id: bootstrap.task_responder
name: "Bootstrap Task Responder"
runtime: shell
mode: finalize_task

description: >-
  兼容当前 shell.worker.generate_task_final_reply 行为的默认 Agent Profile。
  它的职责是：基于 task 结果草稿与工具痕迹，生成最终面向用户的自然语言回复。

model_route: task_responder_default

prompt:
  pack: bootstrap_cn
  assembly: task_responder
  prefill: ""

context:
  injectors:
    - id: source_user_text
      enabled: true
    - id: task_instruction
      enabled: true
    - id: task_result_draft
      enabled: true
    - id: task_tool_traces
      enabled: true
      params:
        history_limit_runtime_key: shell.responder.tool_trace_history_limit
        fallback_limit: 200

capabilities:
  can_direct_reply: true
  can_create_task: false
  can_use_tools: false
  can_request_restart: false

output:
  channel: user
  format: plain_text
  strip_internal_tool_trace: true

compat:
  current_runtime_mapping:
    python_entrypoint: shell.worker.generate_task_final_reply
    legacy_prompt_file: config/prompts/task_responder_prompt.txt
