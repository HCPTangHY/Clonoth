# Clonoth runtime tuning config
#
# - 本文件可以提交到仓库。
# - 敏感信息应放在环境变量或 data/config.yaml 中。

version: 1

engine:
  max_steps: 32
  streaming: true
  history_limit: 80
  poll_interval_sec: 1.0
  approval_poll_interval_sec: 0.5

  http:
    client_timeout_sec: 60.0

  supervisor:
    health_timeout_sec: 2.0
    wait_poll_interval_sec: 0.5

  tool_trace:
    max_inline_chars: 8000
    max_progress_arg_chars: 320

  model: ""

providers:
  openai:
    timeout_sec: 60.0

meta:
  execute_command:
    default_timeout_sec: 90.0
    max_output_chars: 12000

  git:
    diff_max_chars: 600000

  search:
    max_file_size_bytes: 3000000
    max_matches: 100

tools:
  command:
    default_timeout_sec: 60.0

skills:
  max_budget_chars: 0       # 0 = no limit; max total chars of skill body to inject

shell:
  default_conversation_key: "cli:default"
  workflow_id: "bootstrap.default_chat"

  entry_node:
    history_limit: 40
    model: ""

  reply_node:
    tool_trace_history_limit: 200
    model: ""

  http:
    client_timeout_sec: 10.0

  supervisor:
    health_timeout_sec: 2.0
    wait_poll_interval_sec: 0.5

  events_poll_interval_sec: 0.5

supervisor:
  process_manager:
    stop_wait_timeout_sec: 5.0
    shell_new_console: null
    engine_workers: 2
