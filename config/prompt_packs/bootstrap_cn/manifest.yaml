version: 1
kind: prompt_pack
id: bootstrap_cn
name: "Bootstrap 中文提示词包"

description: >-
  将当前三个固定 prompt 重构为 fragments 的第一版草案。
  目标不是立刻替换现有逻辑，而是先建立未来可组合提示词系统的基本形状。

fragments_root: fragments

assemblies:
  shell_orchestrator:
    - core/substrate_boundary.md
    - core/non_fabrication.md
    - roles/shell_orchestrator.md
    - styles/concise_zh.md

  task_responder:
    - core/substrate_boundary.md
    - core/non_fabrication.md
    - roles/task_responder.md
    - styles/concise_zh.md

  kernel_executor:
    - core/substrate_boundary.md
    - core/non_fabrication.md
    - core/tool_protocol.md
    - roles/kernel_executor.md
    - styles/concise_zh.md

variables:
  default_language: zh-CN

compat:
  legacy_prompt_files:
    shell_orchestrator: config/prompts/shell_orchestrator_prompt.txt
    task_responder: config/prompts/task_responder_prompt.txt
    kernel_executor: config/prompts/kernel_system_prompt.txt
