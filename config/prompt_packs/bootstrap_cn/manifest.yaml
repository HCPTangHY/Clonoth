version: 1
kind: prompt_pack
id: bootstrap_cn
name: "Bootstrap 中文提示词包"

description: >-
  当前节点系统的默认提示词包。
  入口节点、执行节点、规划节点、复核节点和回复节点都从这里组装提示词。

fragments_root: fragments

assemblies:
  shell_orchestrator:
    - core/substrate_boundary.md
    - core/non_fabrication.md
    - roles/shell_orchestrator.md
    - styles/concise_zh.md

  executor:
    - core/substrate_boundary.md
    - core/non_fabrication.md
    - core/tool_protocol.md
    - roles/executor.md
    - styles/concise_zh.md

  planner:
    - core/substrate_boundary.md
    - core/non_fabrication.md
    - roles/planner.md
    - styles/concise_zh.md

  reviewer:
    - core/substrate_boundary.md
    - core/non_fabrication.md
    - roles/reviewer.md
    - styles/concise_zh.md

  cmd_reviewer:
    - roles/cmd_reviewer.md

variables:
  default_language: zh-CN
